<div class="dialog-overlay hidden">
  <div class="dialog mail-handler-dialog">
    <div class="dialog-header">
      <img data-icon="mailApp" width="20" height="20" alt="">
      <span class="dialog-title">{{mailHandlerDialogTitle}}</span>
      <button class="dialog-close" id="mail-handler-close">✕</button>
    </div>
    <div class="dialog-fields">
      <p class="rclone-hint">{{mailHandlerDialogHint}}</p>
      <div id="mail-handler-app-list" class="mail-handler-list"></div>
    </div>
    <div class="confirm-actions">
      <button class="btn-cancel" id="mail-handler-cancel">{{confirmCancel}}</button>
      <button class="btn-secondary" id="mail-handler-save">{{mailHandlerDialogSave}}</button>
    </div>
  </div>
</div>
