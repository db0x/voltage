<div class="dialog-overlay hidden">
  <div class="dialog about-dialog">
    <button class="dialog-close" id="about-close">✕</button>
    <div class="about-icon-wrap">
      <img src="../../assets/voltage.svg" alt="Voltage" class="about-icon">
    </div>
    <pre class="about-ascii"></pre>
    <div class="about-version">v{{version}}</div>
    <div class="about-license">{{aboutLicense}}</div>
    <a class="about-github" href="#" id="about-github-link">
      <img data-icon="github" width="20" height="20" alt="" class="about-github-icon">{{aboutGithub}}
    </a>
    <div class="about-integrations">
      <div class="about-integration" id="about-obsidian" data-tooltip="{{aboutObsidianAvailable}}" hidden>
        <div class="about-integration-icon-wrap">
          <img data-icon="obsidian" width="38" height="38" alt="">
          <span class="about-plugin-badge"><img data-icon="pluginBadge" width="14" height="14" alt=""></span>
        </div>
      </div>
      <div class="about-integration" id="about-rclone-plugin" data-tooltip="{{aboutRclonePlugin}}" hidden>
        <div class="about-integration-icon-wrap">
          <img data-icon="rclonePlugin" width="38" height="38" alt="">
          <span class="about-plugin-badge"><img data-icon="pluginBadge" width="14" height="14" alt=""></span>
        </div>
      </div>
    </div>
  </div>
</div>
