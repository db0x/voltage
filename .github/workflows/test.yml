name: UI & Integration Tests

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04

    # Shared by every test step so both the UI suite and the AppImage launch see the virtual display.
    env:
      DISPLAY: ':99'
      LIBGL_ALWAYS_SOFTWARE: '1'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Electron system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-0 \
            libnotify4 \
            libnss3 \
            libxss1 \
            libxtst6 \
            xauth \
            xvfb \
            dbus-x11 \
            libgbm1 \
            libasound2

      - name: Start virtual display and D-Bus session
        run: |
          Xvfb :99 -screen 0 1280x1024x24 -extension MIT-SHM &
          sleep 1
          eval $(dbus-launch --sh-syntax)
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> $GITHUB_ENV

      # The Manager-UI suite. Runs serially (workers: 1 — the fixtures share on-disk config/state),
      # so it cannot be sped up by parallelism without isolating per-test state. ~4 min today; the
      # budget keeps headroom so normal runner variance doesn't trip a false timeout.
      - name: Run UI tests
        timeout-minutes: 8
        run: npm test

      # The heavy integration test: builds a real AppImage (downloads the Electron dist on a cold
      # runner) then launches it, so it gets its own, larger budget and no retries (the project
      # config disables them — a retried build would be far too expensive).
      - name: Run AppImage integration test
        timeout-minutes: 20
        run: npm run test:appimage
