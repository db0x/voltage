<!DOCTYPE html>
<!-- Voltage widget drag-zone overlay. Rendered in its OWN WebContentsView on top of the app view
     (see src/window.js view-mode wiring). The control is a -webkit-app-region: drag region, so
     dragging it moves the frameless host window — independent of whatever the wrapped app renders.
     Why a separate view and not CSS in the app: Chromium honors -webkit-app-region:drag only from a
     top-level frame we own, NOT from the cross-origin out-of-process iframes many apps render their
     toolbars in (e.g. the Office/WOPI editor frame). This view IS our own top frame, so its drag
     region always works.

     The view is 1px (invisible — body transparent, control at opacity 0) when idle and grown by main
     when the cursor reaches the top-centre. The visible control is .handle, inset by DRAG_ZONE_PAD on
     the sides and bottom (top flush with the window edge) so its border + drop shadow render INSIDE
     the view rather than being clipped — the surrounding pad is transparent but still part of the
     drag/hit area. It fades in/out via the `shown` class (toggled from main over IPC by
     drag-zone-preload.js). Styling mirrors Voltage's link tooltip (src/tooltip.css): a dark,
     translucent, blurred bar with rounded bottom corners, a GNOME-style hairline border and a
     downward drop shadow. On the right are window-control buttons (no-drag so they stay clickable);
     each forwards its data-action to main via the preload.
     The 16px inset MUST match DRAG_ZONE_PAD, and .handle height (42px) DRAG_ZONE_HEIGHT, in
     src/window.js. -->
<html>
<head>
<meta charset="utf-8">
<style>
  /* Body is transparent (so the idle view shows nothing); only .handle is painted. */
  html, body { margin: 0; height: 100%; overflow: hidden; background: transparent;
    font: 13px/1 -apple-system, system-ui, sans-serif; }
  body { -webkit-app-region: drag; }
  .handle {
    position: absolute; top: 0; left: 16px; right: 16px; height: 42px;
    box-sizing: border-box;
    /* ONE flat flex row (gear, gap, zoom, …, window controls): all controls are siblings so the
       mac-order mode below can rearrange them purely via CSS `order` — elements can't be moved
       between separate flex containers. The .gap spacer replaces justify-content: space-between. */
    display: flex; align-items: center; gap: 2px;
    padding: 0 6px;
    background: rgba(30, 30, 30, 0.85);
    backdrop-filter: blur(4px);
    /* GNOME-style hairline border on the three free sides (top is flush with the window edge). */
    border-left: 1px solid rgba(255, 255, 255, 0.14);
    border-right: 1px solid rgba(255, 255, 255, 0.14);
    border-bottom: 1px solid rgba(255, 255, 255, 0.14);
    border-bottom-left-radius: 9px; border-bottom-right-radius: 9px;
    /* Downward drop shadow, spreading to the left and right; renders into the transparent pad. */
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.5);
    /* Fade duration must match DRAG_ZONE_FADE_MS in src/window.js (the height collapse is delayed by
       that long so the fade-out is visible). */
    opacity: 0; transition: opacity 160ms ease;
  }
  body.shown .handle { opacity: 1; }

  /* Flexible spacer between the left and right control groups; stays part of the drag surface
     (no no-drag on it), so the bar's middle keeps moving the window. */
  .gap { flex: 1; align-self: stretch; }
  .btn {
    -webkit-app-region: no-drag;
    width: 30px; height: 26px; padding: 0; border: none; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; color: rgba(255, 255, 255, 0.85); cursor: pointer;
  }
  .btn:hover { background: rgba(255, 255, 255, 0.16); color: #fff; }
  .btn-close:hover { background: #e81123; color: #fff; }
  .btn svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.4;
    stroke-linecap: round; stroke-linejoin: round; }
  /* The About button uses the filled info glyph (info.svg), not a stroked one. */
  .btn-about svg { width: 16px; height: 16px; fill: currentColor; stroke: none; }
  /* The Configure (gear) button uses the filled configure.svg glyph. */
  .btn-config svg { width: 16px; height: 16px; fill: currentColor; stroke: none; }
  /* The DevTools button uses the filled dev-tools.svg glyph. */
  .btn-devtools svg { width: 16px; height: 16px; fill: currentColor; stroke: none; }
  /* The Maximize button uses the filled fullscreen.svg glyph. */
  .btn-max svg { width: 15px; height: 15px; fill: currentColor; stroke: none; }
  /* The Minimize button uses the filled minimize.svg glyph. */
  .btn-min svg { width: 16px; height: 16px; fill: currentColor; stroke: none; }

  /* Every button (the left gear and the four right-hand controls) reveals a label on hover. The label
     is centred ON THE BAR — absolute, positioned against .handle (the nearest positioned ancestor) —
     rather than next to its button, so hovering never shifts the buttons. Only one button is hovered
     at a time, so only one label shows; it is capped and ellipsised so it can't reach the gear or the
     button group. The button is no-drag (clickable) so its :hover fires; the label is pointer-events:
     none so it can't keep itself hovered. */
  .config, .ctl { display: flex; align-items: center; }
  /* The label lives in the FREE ZONE between the gear (~42px on the left) and the right-hand group, so
     it can never overlap either. --dz-right is the width that group occupies; it grows when the zoom
     controls are present. The label box is centred within that zone (and capped to its width, so it
     ellipsises rather than spilling); on a narrow bar it anchors to the left edge of the zone instead. */
  .handle { --dz-left: 42px; --dz-right: 140px; }
  body.devtools-enabled .handle { --dz-right: 170px; }
  body.zoom-enabled .handle { --dz-right: 256px; }
  body.zoom-enabled.devtools-enabled .handle { --dz-right: 286px; }
  /* mac-order free-zone widths: left = the three window controls, right = gear + About (+DevTools,
     + zoom group) — must track the order rules at the bottom of this sheet. */
  body.mac-order .handle { --dz-left: 104px; --dz-right: 80px; }
  body.mac-order.devtools-enabled .handle { --dz-right: 110px; }
  body.mac-order.zoom-enabled .handle { --dz-right: 196px; }
  body.mac-order.zoom-enabled.devtools-enabled .handle { --dz-right: 226px; }
  .label {
    position: absolute; top: 50%;
    left: calc((var(--dz-left) + 100% - var(--dz-right)) / 2);
    transform: translate(-50%, -50%);
    max-width: calc(100% - var(--dz-left) - var(--dz-right));
    font-size: 12px; color: rgba(255, 255, 255, 0.92);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    pointer-events: none; opacity: 0; transition: opacity 120ms ease;
  }
  .config:hover .label, .ctl:hover .label { opacity: 1; }
  @media (max-width: 420px) {
    .label { left: var(--dz-left); transform: translateY(-50%); }
  }

  /* Zoom controls (− / level / +) plus a separator from the window buttons — both shown only for apps
     with the zoom plugin (body.zoom-enabled), else the separator would dangle on its own. */
  .zoom { display: none; align-items: center; gap: 2px; -webkit-app-region: no-drag; }
  .sep  { display: none; width: 1px; height: 18px; margin: 0 6px; background: rgba(255, 255, 255, 0.22); }
  body.zoom-enabled .zoom { display: flex; }
  body.zoom-enabled .sep  { display: block; }

  /* DevTools button — shown only when DevTools are enabled for the app (body.devtools-enabled, set
     from the build config's "devTools" flag). Hidden entirely otherwise, matching the disabled tools. */
  .ctl.devtools { display: none; }
  body.devtools-enabled .ctl.devtools { display: flex; }
  .zoom-pct { min-width: 40px; text-align: center; font-size: 12px; color: rgba(255, 255, 255, 0.9);
    -webkit-app-region: no-drag; pointer-events: none; font-variant-numeric: tabular-nums; }

  /* Light theme — opt-in per app via the widget config (default is the dark theme above). Flips the
     panel, text, icons (currentColor) and dividers to a light palette; the close-button hover stays
     red, which reads on both. */
  body.light .handle {
    background: rgba(245, 245, 245, 0.9);
    border-color: rgba(0, 0, 0, 0.12);
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
  }
  body.light .btn { color: rgba(0, 0, 0, 0.7); }
  body.light .btn:hover { background: rgba(0, 0, 0, 0.1); color: #000; }
  /* Keep the close button's red hover in light theme too (the generic light hover above is more
     specific than .btn-close:hover, so it needs a light-specific override to win). */
  body.light .btn-close:hover { background: #e81123; color: #fff; }
  body.light .label, body.light .zoom-pct { color: rgba(0, 0, 0, 0.85); }
  body.light .sep { background: rgba(0, 0, 0, 0.18); }

  /* mac-order — opt-in per app (widget config, default = the classic layout above): window controls
     move to the LEFT with close outermost (macOS traffic-light order close/min/max), everything else
     (zoom, DevTools, About, gear) to the right. Pure reordering of the flat flex row; EVERY child
     needs an explicit order here, since unlisted elements (order:0) would jump to the front. */
  body.mac-order .ctl-close { order: 1; }
  body.mac-order .ctl-min   { order: 2; }
  body.mac-order .ctl-max   { order: 3; }
  body.mac-order .gap       { order: 4; }
  body.mac-order .zoom      { order: 5; }
  body.mac-order .sep       { order: 6; }
  body.mac-order .devtools  { order: 7; }
  body.mac-order .ctl-about { order: 8; }
  body.mac-order .config    { order: 9; }
</style>
</head>
<body class="{{bodyClass}}">
  <div class="handle">
    <div class="config">
      <button class="btn btn-config" data-action="configure">
        <svg viewBox="0 0 16 16"><path fill="currentColor" d="M 6.25 1 L 6.0957031 2.84375 A 5.5 5.5 0 0 0 4.4882812 3.7734375 L 2.8125 2.984375 L 1.0625 6.015625 L 2.5839844 7.0722656 A 5.5 5.5 0 0 0 2.5 8 A 5.5 5.5 0 0 0 2.5800781 8.9316406 L 1.0625 9.984375 L 2.8125 13.015625 L 4.484375 12.228516 A 5.5 5.5 0 0 0 6.0957031 13.152344 L 6.2460938 15.001953 L 9.7460938 15.001953 L 9.9003906 13.158203 A 5.5 5.5 0 0 0 11.507812 12.228516 L 13.183594 13.017578 L 14.933594 9.9863281 L 13.412109 8.9296875 A 5.5 5.5 0 0 0 13.496094 8.0019531 A 5.5 5.5 0 0 0 13.416016 7.0703125 L 14.933594 6.0175781 L 13.183594 2.9863281 L 11.511719 3.7734375 A 5.5 5.5 0 0 0 9.9003906 2.8496094 L 9.75 1 L 6.25 1 z M 8 6 A 2 2 0 0 1 10 8 A 2 2 0 0 1 8 10 A 2 2 0 0 1 6 8 A 2 2 0 0 1 8 6 z"/></svg>
      </button>
      <span class="label">{{configLabel}}</span>
    </div>
    <div class="gap"></div>
    <!-- Zoom controls — shown only when the app loads the zoom plugin (body.zoom-enabled). The − / +
         buttons drive the zoom plugin's applyZoom via main; the readout shows the live level. -->
    <div class="zoom">
        <button class="btn" data-action="zoom-out">
          <svg viewBox="0 0 16 16"><line x1="3.5" y1="8" x2="12.5" y2="8"/></svg>
        </button>
        <span class="zoom-pct">100%</span>
        <button class="btn" data-action="zoom-in">
          <svg viewBox="0 0 16 16"><line x1="3.5" y1="8" x2="12.5" y2="8"/><line x1="8" y1="3.5" x2="8" y2="12.5"/></svg>
        </button>
    </div>
    <div class="sep"></div>
    <!-- DevTools — opens Chromium's developer tools for the wrapped app view (detached). Filled
         dev-tools.svg glyph; sits between the zoom group and the About button. -->
    <div class="ctl devtools"><span class="label">{{devtoolsLabel}}</span>
      <button class="btn btn-devtools" data-action="devtools">
        <svg viewBox="0 0 16 16"><path d="M 9.5,0 5.5,15.754 6.5,16 10.5,0.246 Z M 4.2539,3 0,8 4.2539,13 6,12.291 2.3359,8 6,3.709 Z M 11.746,3 10,3.709 13.664,8 10,12.291 11.746,13 16,8 Z"/></svg>
      </button>
    </div>
    <div class="ctl ctl-about"><span class="label">{{aboutLabel}}</span>
      <button class="btn btn-about" data-action="about">
        <svg viewBox="0 0 16 16"><path d="M 8 1 A 7 7 0 0 0 1 8 A 7 7 0 0 0 8 15 A 7 7 0 0 0 15 8 A 7 7 0 0 0 8 1 z M 8 3.75 A 1.25 1.25 0 0 1 9.25 5 A 1.25 1.25 0 0 1 8 6.25 A 1.25 1.25 0 0 1 6.75 5 A 1.25 1.25 0 0 1 8 3.75 z M 7 7 L 9 7 L 9 12 L 7 12 L 7 7 z"/></svg>
      </button>
    </div>
    <div class="ctl ctl-min"><span class="label">{{minLabel}}</span>
      <button class="btn btn-min" data-action="minimize">
        <svg viewBox="0 0 16 16"><path fill="currentColor" d="M 5 10 L 5 12 L 11 12 L 11 10 L 5 10 z"/></svg>
      </button>
    </div>
    <div class="ctl ctl-max"><span class="label">{{maxLabel}}</span>
      <button class="btn btn-max" data-action="maximize">
        <svg viewBox="0 0 16 16"><path fill="currentColor" d="M 2,2 C 1,2 1,3 1,3 V 7 H 3 V 4 H 6 V 2 Z M 10,2 V 4 H 13 V 7 H 15 V 3 C 15,2 14,2 14,2 Z M 1,9 V 13 C 1,14 2,14 2,14 H 6 V 12 H 3 V 9 Z M 13,9 V 12 H 10 V 14 H 14 C 14,14 15,14 15,13 V 9 Z"/></svg>
      </button>
    </div>
    <div class="ctl ctl-close"><span class="label">{{closeLabel}}</span>
      <button class="btn btn-close" data-action="quit">
        <svg viewBox="0 0 16 16"><line x1="4.2" y1="4.2" x2="11.8" y2="11.8"/><line x1="11.8" y1="4.2" x2="4.2" y2="11.8"/></svg>
      </button>
    </div>
  </div>
</body>
</html>
